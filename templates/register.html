<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="theme-toggle" onclick="toggleTheme()">🌙</div>

<div class="main-container">

    <div class="card">
        <h2>CREATE ACCOUNT</h2>

        <form method="POST">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <h4>Select 3 Emojis</h4>

            <div class="emoji-container">
            <span class="emoji" onclick="selectEmoji(this)">😀</span>
            <span class="emoji" onclick="selectEmoji(this)">🔥</span>
            <span class="emoji" onclick="selectEmoji(this)">🚀</span>
            <span class="emoji" onclick="selectEmoji(this)">🌞</span>
            <span class="emoji" onclick="selectEmoji(this)">💎</span>
            </div>

<input type="hidden" name="emoji_sequence" id="emoji_sequence">
          <!--🔐 ADD SECRET QUESTION HERE -->
    <select name="secret_question" class="input-box" required>
        <option value="">Select Secret Question</option>
        <option value="pet">What is your first pet name?</option>
        <option value="school">What is your school name?</option>
        <option value="color">What is your favorite color?</option>
    </select>

    <input type="text" name="secret_answer" placeholder="Secret Answer" required

    <input type="text" name="secret" placeholder="Secret Answer" required>

            <button class="neon-btn">Sign Up</button>
        </form>

        <br>
        <a href="{{ url_for('login') }}">Login here</a>
    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script src="{{ url_for('static', filename='js/particles.js') }}"></script>
<audio id="typingSound" src="{{ url_for('static', filename='sounds/click_sound.wav') }}"></audio>

</body>
</html>
