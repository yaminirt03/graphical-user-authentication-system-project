<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="theme-toggle" onclick="toggleTheme()">🌙</div>

<div class="main-container">

    <div class="card" id="loginCard">
        <h2>LOGIN</h2>

        <form method="POST">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <h4>Select 3 Emojis</h4>

            <div class="emoji-container">
            <span class="emoji" onclick="selectEmoji(this)">😀</span>
            <span class="emoji" onclick="selectEmoji(this)">🔥</span>
            <span class="emoji" onclick="selectEmoji(this)">🚀</span>
            <span class="emoji" onclick="selectEmoji(this)">🌞</span>
            <span class="emoji" onclick="selectEmoji(this)">💎</span>
            </div>


            <input type="hidden" name="emoji_sequence" id="emoji_sequence">

            <input type="text" name="secret" placeholder="Secret Answer" required>

            <button class="neon-btn">Login</button>
        </form>

        <br>
        <a href="{{ url_for('register') }}">Create Account</a>
    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script src="{{ url_for('static', filename='js/particles.js') }}"></script>
{% if error %}
<script>
    triggerShake();
</script>
{% endif %}
<audio id="typingSound" src="{{ url_for('static', filename='sounds/click_sound.wav') }}"></audio>
</body>
</html>
